<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse | TechStore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        html {
            scroll-behavior: smooth;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }
        
        /* Fondo animado */
        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
            animation: pulse 15s ease-in-out infinite;
            pointer-events: none;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
            50% { transform: translate(-5%, -5%) scale(1.05); opacity: 1; }
        }
        
        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 10px;
            transition: background 0.3s ease;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
        }
        
        .auth-container {
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 10;
            animation: fadeInUp 0.6s ease-out;
            margin: auto;
            padding: 1rem 0;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .auth-card {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(59, 130, 246, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: visible;
        }
        
        .auth-card:hover {
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6),
                        0 0 0 1px rgba(59, 130, 246, 0.2);
        }
        
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }
        
        .auth-logo i {
            font-size: 2.25rem;
            color: #3b82f6;
            filter: drop-shadow(0 4px 8px rgba(59, 130, 246, 0.3));
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .auth-logo span {
            font-size: 1.85rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }
        
        .auth-title {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }
        
        .auth-subtitle {
            color: #94a3b8;
            text-align: center;
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }
        
        .form-group label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .form-group label i {
            color: #3b82f6;
            font-size: 0.9rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 1rem;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }
        
        .form-group input:hover {
            border-color: rgba(59, 130, 246, 0.4);
        }
        
        .form-group input::placeholder {
            color: #475569;
            font-weight: 400;
        }
        
        .password-wrapper {
            position: relative;
        }
        
        .password-wrapper input {
            padding-right: 50px;
        }
        
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            padding: 8px;
            transition: color 0.3s ease;
            border-radius: 0.5rem;
        }
        
        .toggle-password:hover {
            color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
        
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #94a3b8;
            font-size: 0.9rem;
            cursor: pointer;
            margin-bottom: 1.75rem;
            transition: color 0.3s ease;
        }
        
        .checkbox-label:hover {
            color: #cbd5e1;
        }
        
        .checkbox-label input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #3b82f6;
            cursor: pointer;
            border-radius: 0.25rem;
        }
        
        .checkbox-label a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        
        .checkbox-label a:hover {
            color: #3b82f6;
            text-decoration: underline;
        }
        
        .btn-auth {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border: none;
            border-radius: 1rem;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .btn-auth::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-auth:hover::before {
            left: 100%;
        }
        
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }
        
        .btn-auth:active {
            transform: translateY(0);
        }
        
        .btn-auth:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .auth-divider {
            position: relative;
            text-align: center;
            margin: 1.5rem 0;
        }
        
        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .auth-divider span {
            position: relative;
            background: rgba(15, 23, 42, 0.85);
            padding: 0 1rem;
            color: #64748b;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .social-login {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        
        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.75rem;
            color: #cbd5e1;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .social-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-2px);
        }
        
        .social-btn i {
            font-size: 1.1rem;
        }
        
        .social-btn.google i {
            color: #ea4335;
        }
        
        .social-btn.facebook i {
            color: #1877f2;
        }
        
        .auth-footer {
            text-align: center;
            color: #64748b;
            font-size: 0.9rem;
        }
        
        .auth-footer a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .auth-footer a:hover {
            color: #3b82f6;
            text-decoration: underline;
        }
        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.25rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            padding: 0.5rem;
            border-radius: 0.75rem;
        }
        
        .back-link:hover {
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }
        
        .back-link i {
            margin-right: 0.5rem;
        }
        
        .auth-message {
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1.5rem;
            display: none;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .auth-message i {
            font-size: 1.1rem;
        }
        
        .auth-message.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }
        
        .auth-message.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }
        
        /* Password strength indicator */
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .password-strength-bar {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background 0.3s ease;
            border-radius: 2px;
        }
        
        .strength-weak { width: 33%; background: #ef4444; }
        .strength-medium { width: 66%; background: #f59e0b; }
        .strength-strong { width: 100%; background: #10b981; }
        
        /* Responsive */
        @media (max-width: 480px) {
            body {
                padding: 1rem;
            }
            
            .auth-card {
                padding: 1.75rem;
                border-radius: 2rem;
            }
            
            .auth-title {
                font-size: 1.75rem;
            }
            
            .social-login {
                flex-direction: column;
            }
        }
        
        @media (max-height: 750px) {
            .auth-card {
                padding: 1.75rem;
            }
            
            .auth-logo {
                margin-bottom: 1.25rem;
            }
            
            .auth-title {
                font-size: 1.75rem;
            }
            
            .auth-subtitle {
                margin-bottom: 1.25rem;
            }
            
            .form-group {
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <i class="fas fa-shopping-cart"></i>
                <span>TechStore</span>
            </div>
            <h2 class="auth-title">Crear Cuenta</h2>
            <p class="auth-subtitle">Únete y obtén beneficios exclusivos</p>
            
            <div id="message" class="auth-message"></div>
            
            <form id="registerForm">
                <div class="form-group">
                    <label>
                        <i class="fas fa-user"></i>
                        Nombre Completo
                    </label>
                    <input type="text" id="fullName" placeholder="Juan Pérez" required autocomplete="name">
                </div>
                
                <div class="form-group">
                    <label>
                        <i class="fas fa-envelope"></i>
                        Correo Electrónico
                    </label>
                    <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label>
                        <i class="fas fa-lock"></i>
                        Contraseña
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Mínimo 6 caracteres" required autocomplete="new-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="fas fa-eye" id="toggleIcon1"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>
                        <i class="fas fa-check-circle"></i>
                        Confirmar Contraseña
                    </label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required autocomplete="new-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                            <i class="fas fa-eye" id="toggleIcon2"></i>
                        </button>
                    </div>
                </div>
                
                <label class="checkbox-label">
                    <input type="checkbox" id="acceptTerms" required>
                    <span>Acepto los <a href="#" onclick="showTerms()">términos y condiciones</a></span>
                </label>
                
                <button type="submit" class="btn-auth" id="submitBtn">
                    <i class="fas fa-user-plus"></i> Crear Cuenta
                </button>
            </form>
            
            <div class="auth-divider">
                <span>O regístrate con</span>
            </div>
            
            <div class="social-login">
                <button class="social-btn google" onclick="socialRegister('google')">
                    <i class="fab fa-google"></i>
                    Google
                </button>
                <button class="social-btn facebook" onclick="socialRegister('facebook')">
                    <i class="fab fa-facebook-f"></i>
                    Facebook
                </button>
            </div>
            
            <div class="auth-footer">
                <p>¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a></p>
            </div>
            <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver a la tienda</a>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3000/api';
        
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = inputId === 'password' ? document.getElementById('toggleIcon1') : document.getElementById('toggleIcon2');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                <span>${text}</span>
            `;
            msg.className = `auth-message ${type}`;
            msg.style.display = 'flex';
            if (type === 'success') setTimeout(() => msg.style.display = 'none', 5000);
        }
        
        function showTerms() {
            showMessage('📄 Al registrarte aceptas nuestros términos de servicio y política de privacidad.', 'info');
        }
        
        function socialRegister(provider) {
            showMessage(`Registrando con ${provider}...`, 'success');
        }
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const accept = document.getElementById('acceptTerms').checked;
            const btn = document.getElementById('submitBtn');
            
            if (!fullName.trim()) { showMessage('Ingresa tu nombre completo', 'error'); return; }
            if (!accept) { showMessage('Debes aceptar los términos y condiciones', 'error'); return; }
            if (password !== confirm) { showMessage('Las contraseñas no coinciden', 'error'); return; }
            if (password.length < 6) { showMessage('La contraseña debe tener al menos 6 caracteres', 'error'); return; }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creando cuenta...';
            
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name: fullName })
                });
                const data = await res.json();
                
                if (res.ok) {
                    showMessage('✅ ¡Registro exitoso! Revisa tu email para verificar tu cuenta. Redirigiendo...', 'success');
                    setTimeout(() => window.location.href = 'login.html', 3500);
                } else {
                    showMessage(data.error || 'Error al registrarse. Intenta con otro email.', 'error');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-user-plus"></i> Crear Cuenta';
                }
            } catch (err) {
                showMessage('Error de conexión. Intenta nuevamente.', 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Crear Cuenta';
            }
        });
    </script>
</body>
</html>
